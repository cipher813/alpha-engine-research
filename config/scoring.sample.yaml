# Scoring parameters — controls how raw signals become attractiveness scores.
# Copy to scoring.yaml and customise all values below.
# These are intentionally naive defaults — tune them to your own research.

technical:
  rsi:
    # Regime-aware overbought/oversold thresholds. Bull regime tolerates
    # higher RSI (trending markets stay "overbought" longer); bear regime
    # caps the oversold-zone bonus (oversold in a downtrend can signal
    # further decline, not a bounce). Tune these to your own research.
    #
    # bear.max_oversold_score raised 75 → 85 as part of the 2026-04-16
    # conservatism-reduction pass. The Tier 0 quant regime classifier was
    # retired (alpha-engine-predictor PR #34), leaving the LLM macro_regime
    # as the only regime signal — and an unvalidated one. Capping bear-regime
    # oversold scores at 75 when the regime label itself is noisy double-
    # penalizes every oversold name any time the macro agent says "bear",
    # which is exactly when mean-reversion opportunities appear. 10-point
    # lift is a moderate relaxation; full parity with bull (100) would
    # remove the regime-conditioning entirely — not yet warranted given
    # LLM regime signal is our only regime signal.
    bull:
      overbought: 80
      oversold: 35
      max_oversold_score: 100.0
    bear:
      overbought: 70
      oversold: 40
      max_oversold_score: 85.0
    neutral:
      overbought: 70
      oversold: 30
      max_oversold_score: 100.0

  macd:
    bullish_cross_above_zero: 100.0
    bullish_cross_below_zero: 70.0
    bearish_cross_above_zero: 30.0
    bearish_cross_below_zero: 0.0
    no_cross_above_zero: 60.0
    no_cross_below_zero: 40.0

  price_vs_ma:
    upper_anchor_pct: 5
    upper_anchor_score: 80.0
    upper_max_score: 100.0
    upper_scale_pct: 15.0
    mid_score: 50.0
    positive_scale: 6.0
    lower_anchor_pct: -5
    lower_anchor_score: 30.0
    negative_scale: 4.0
    lower_floor_score: 0.0
    lower_decay: 1.5

  momentum:
    mid_score: 50.0
    raw_scale: 3.0

  composite_weights:
    # Weights distribute the composite technical score across 5 sub-signals.
    # Must sum to 1.0. momentum weight bumped 0.20 → 0.25 as part of the
    # 2026-04-16 conservatism pass — the 2-year price-momentum sub-signal
    # is what catches breakouts/trend changes, which is exactly what the
    # low-vol portfolio has been missing. Weight pulled equally from the
    # MA50/MA200 trend-following sub-signals (0.20 → 0.175 each): in a
    # bull market MA-based signals already over-reward established winners
    # and underweight the new names accelerating; trimming them redirects
    # attention to recent momentum.
    rsi: 0.20
    macd: 0.20
    ma50: 0.175
    ma200: 0.175
    momentum: 0.25

  predictor_enrichment:
    confidence_gate: 0.60
    max_adjustment: 10.0

aggregator:
  macro_modifier_range: 0.30
  macro_max_shift_points: 10.0
  macro_modifier_clamp_min: 0.70
  macro_modifier_clamp_max: 1.30

  long_term_weights:
    quant: 0.50
    qual: 0.50

  consistency_check:
    bullish_terms:
      - strong buy
      - bullish
      - upside
      - outperform
    bearish_terms:
      - sell
      - downside
      - bearish
      - underperform
    bearish_score_threshold: 40
    bullish_score_threshold: 70

staleness:
  threshold_days: 5
  material_score_change_min: 3.0

macro:
  overweight_threshold: 1.10
  underweight_threshold: 0.90
