name: Deploy

on:
  push:
    branches: [main]
    paths:
      # Only rebuild + redeploy when code or infra that actually lands in the
      # Docker image changes. Docs, tests, CI, and example files do not.
      - 'agents/**'
      - 'data/**'
      - 'graph/**'
      - 'lambda/**'
      - 'rag/**'
      - 'scoring/**'
      - 'archive/**'
      - 'health_status.py'
      - 'config.py'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'infrastructure/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # manual trigger from Actions UI

# Concurrency: only one deploy at a time, cancel in-progress runs on new push
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Build + deploy to Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout research repo
        uses: actions/checkout@v4
        with:
          path: alpha-engine-research

      # deploy.sh bundles flow-doctor from a sibling directory into the
      # Docker build context. The GitHub-hosted runner does not carry the
      # local ~/Development layout, so we check it out explicitly here.
      # flow-doctor is a public repo and requires no additional auth.
      - name: Checkout flow-doctor
        uses: actions/checkout@v4
        with:
          repository: cipher813/flow-doctor
          path: flow-doctor

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy main Lambda (alpha-engine-research-runner)
        working-directory: alpha-engine-research
        env:
          # deploy.sh defaults FLOW_DOCTOR_DIR to $(dirname $(pwd))/flow-doctor
          # which resolves to $GITHUB_WORKSPACE/flow-doctor — exactly where
          # the second checkout above placed it. The explicit export is
          # belt-and-suspenders for readers.
          FLOW_DOCTOR_DIR: ${{ github.workspace }}/flow-doctor
        run: bash infrastructure/deploy.sh main

      - name: Report deployed version
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          aws lambda get-function \
            --function-name alpha-engine-research-runner \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text
